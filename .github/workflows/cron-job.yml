name: Recordatorio Horario

on:
  schedule:
    # Se ejecuta al minuto 0 de cada hora
    - cron: '0 * * * *'
  # Te permite ejecutarlo manualmente desde la pestaña Actions
  workflow_dispatch:

jobs:
  reporte-horario:
    runs-on: ubuntu-latest
    steps:
      - name: Instalar herramientas de información
        run: |
          sudo apt-get update
          # Instalamos neofetch (o fastfetch si prefieres el clon moderno en C)
          sudo apt-get install -y neofetch

      - name: Ejecutar script de saludo y Neofetch
        run: |
          echo "¡Hola! Este es un mensaje automático que se ejecuta cada hora en punto."
          echo "La hora actual en el servidor es: $(date)"
          echo "--------------------------------------------------"
          
          # Imprimimos el logo de Ubuntu con toda la info del sistema
          neofetch --off
          
          echo "--------------------------------------------------"
          echo "Versión de Node.js instalada por defecto:"
          node -v
