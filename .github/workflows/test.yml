name: Prueba de Saludo

on:
  issues:
    types: [opened]

jobs:
  test-saludo:
    runs-on: ubuntu-latest

    # ─── ESTO ES LO QUE SOLUCIONA EL ERROR ───
    permissions:
      issues: write      # Permite a tu código JS crear el comentario
      contents: read     # Permite a actions/checkout descargar el código
    # ─────────────────────────────────────────

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Ejecutar nuestra acción local
        uses: ./
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}